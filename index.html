<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>高级任务系统</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>✨ 任务系统</h1>
    <div id="project-bar" class="project-bar">
      <div id="project-list" class="project-list"></div>
      <button id="project-create-btn" onclick="createProject()">+ 新项目</button>
    </div>
    <div id="stats" style="margin:10px 0; text-align:center;"></div>
    <div id="filter-bar" class="filter-bar">
      <button id="filter-all" onclick="setFilter('all')">全部</button>
      <button id="filter-active" onclick="setFilter('active')">未完成</button>
      <button id="filter-completed" onclick="setFilter('completed')">已完成</button>
      <button id="history-toggle" onclick="toggleHistoryPanel()">历史记录 / 日历</button>
      <button id="dashboard-toggle" onclick="toggleDashboardPanel()">📊 数据面板</button>
    </div>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="输入任务...">

      <select id="category">
        <option value="daily">📅 每日任务</option>
        <option value="temp">🧠 临时任务</option>
      </select>

      <button onclick="addTodo()">添加</button>
      <button onclick="smartDecomposeTask()">✨ 智能拆解</button>
    </div>

    <div class="board">

      <div class="column">
        <h2>📅 每日任务</h2>
        <ul id="daily-list" class="list"></ul>
      </div>

      <div class="column">
        <h2>🧠 临时任务</h2>
        <ul id="temp-list" class="list"></ul>
      </div>

    </div>

    <div id="history-panel" class="history-panel hidden">
      <div class="history-layout">
        <div class="history-dates">
          <h3>历史日期</h3>
          <ul id="history-date-list"></ul>
        </div>
        <div class="history-detail">
          <h3 id="history-detail-title">请选择日期</h3>
          <div id="history-detail-content"></div>
        </div>
      </div>
    </div>

    <div id="dashboard-panel" class="dashboard-panel hidden">
      <div class="dashboard-grid">
        <div class="dashboard-card">
          <h3>今日完成率</h3>
          <div id="dashboard-rate" class="dashboard-value">0%</div>
          <div id="dashboard-rate-detail" class="dashboard-subtext">0/0</div>
        </div>
        <div class="dashboard-card">
          <h3>今日任务数量</h3>
          <div id="dashboard-count-total" class="dashboard-value">0</div>
          <div id="dashboard-count-detail" class="dashboard-subtext">已完成 0 · 未完成 0</div>
        </div>
        <div class="dashboard-card">
          <h3>连续完成天数</h3>
          <div id="dashboard-streak" class="dashboard-value">0 天</div>
          <div class="dashboard-subtext">基于历史记录自动计算</div>
        </div>
        <div class="dashboard-card dashboard-wide">
          <h3>最近 7 天完成情况</h3>
          <ul id="dashboard-last7" class="dashboard-list"></ul>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
