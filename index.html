<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>LifeOS · 个人生产力系统</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>✨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header class="app-header">
      <div class="header-left">
        <div class="logo-mark">⬡</div>
        <div class="header-titles">
          <h1>LifeOS</h1>
          <p class="header-sub">个人生产力系统</p>
        </div>
      </div>
      <div id="stats" class="stats-inline"></div>
    </header>

    <div id="project-bar" class="project-bar">
      <div id="project-list" class="project-list"></div>
      <button id="project-create-btn" class="btn-ghost" id="btn-new-project">+ 新项目</button>
    </div>

    <div id="filter-bar" class="filter-bar">
      <button id="filter-all" class="filter-btn">全部</button>
      <button id="filter-active" class="filter-btn">未完成</button>
      <button id="filter-completed" class="filter-btn">已完成</button>
      <div class="filter-divider"></div>
      <button id="history-toggle" class="filter-btn icon-btn">📅 历史记录</button>
      <button id="dashboard-toggle" class="filter-btn icon-btn">📊 数据面板</button>
    </div>

    <div class="input-area">
      <input type="text" id="todo-input" placeholder="输入新任务...">
      <select id="category">
        <option value="daily">📅 每日</option>
        <option value="temp">🧠 临时</option>
      </select>
      <button id="btn-add">添加</button>
      <button id="btn-decompose" class="btn-secondary">✨ 智能拆解</button>
    </div>

    <div class="board">
      <div class="column">
        <div class="column-header">
          <span class="column-icon">📅</span>
          <h2>每日任务</h2>
          <span class="column-count" id="daily-count">0</span>
        </div>
        <ul id="daily-list" class="list"></ul>
      </div>

      <div class="column">
        <div class="column-header">
          <span class="column-icon">🧠</span>
          <h2>临时任务</h2>
          <span class="column-count" id="temp-count">0</span>
        </div>
        <ul id="temp-list" class="list"></ul>
      </div>
    </div>

    <div id="history-panel" class="panel hidden">
      <div class="panel-header">
        <h3 class="panel-title">📅 历史记录</h3>
      </div>
      <div class="history-layout">
        <div class="history-dates">
          <p class="section-label">历史日期</p>
          <ul id="history-date-list"></ul>
        </div>
        <div class="history-detail">
          <p class="section-label" id="history-detail-title">请选择日期</p>
          <div id="history-detail-content"></div>
        </div>
      </div>
    </div>

    <div id="dashboard-panel" class="panel hidden">
      <div class="panel-header">
        <h3 class="panel-title">📊 数据面板</h3>
      </div>
      <div class="dashboard-grid">
        <div class="dashboard-card card-highlight">
          <p class="card-label">今日完成率</p>
          <div id="dashboard-rate" class="dashboard-value">0%</div>
          <div id="dashboard-rate-detail" class="dashboard-subtext">0/0 任务</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-track">
              <div id="progress-bar-fill" class="progress-bar-fill" style="width:0%"></div>
            </div>
          </div>
        </div>
        <div class="dashboard-card">
          <p class="card-label">今日任务总数</p>
          <div id="dashboard-count-total" class="dashboard-value">0</div>
          <div id="dashboard-count-detail" class="dashboard-subtext">已完成 0 · 未完成 0</div>
        </div>
        <div class="dashboard-card">
          <p class="card-label">连续完成天数</p>
          <div id="dashboard-streak" class="dashboard-value">0 天</div>
          <div class="dashboard-subtext">基于历史自动计算</div>
        </div>
        <div class="dashboard-card dashboard-wide">
          <p class="card-label">最近 7 天完成情况</p>
          <div class="chart-wrap">
            <div id="dashboard-chart" class="bar-chart"></div>
            <div id="dashboard-chart-labels" class="bar-labels"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
